<style>
  :root{
    --bg: #e0dacb;
    --surface: #f2eee1;
    --surface-2: #e8e2d2;
    --line: #cfc7b2;
    --ink: #2b2a24;
    --ink-dim: #7a7461;
    --orange: #ff5a36;
    --teal: #2b8577;
    --yellow: #c98a1f;
    --purple: #7c5fc4;
    --pink: #c14f7c;
    --blue: #2f6fb8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{ max-width:720px; margin:0 auto; padding-bottom:100px; position:relative; min-height:100vh;}

  /* ===== Header ===== */
  header.top-slim{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px 10px;
  }
  .mini-logo{ height:46px; width:auto; display:block; }
  .search-toggle{
    width:38px; height:38px; border-radius:50%;
    background:var(--surface); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    color:#46785e; cursor:pointer; flex-shrink:0;
  }
  .search-toggle:hover{ border-color:var(--ink-dim); }

  /* ===== Search ===== */
  .search-wrap{ padding:0 20px 14px; }
  .search{
    width:100%; background:var(--surface); border:1px solid var(--line);
    border-radius:14px; padding:13px 16px; color:var(--ink);
    font-family:'Inter'; font-size:14.5px; outline:none;
  }
  .search::placeholder{ color:var(--ink-dim); }
  .search:focus{ border-color:var(--teal); }

  /* ===== Grid ===== */
  .catalog-list{
    display:flex; flex-direction:column;
    padding:6px 20px 20px;
  }

  .row{
    display:flex; align-items:center; gap:13px;
    padding:13px 0 13px 14px; position:relative;
    border-bottom:1px dashed var(--line);
  }
  .row:last-child{ border-bottom:none; }
  .row::before{
    content:""; position:absolute; left:0; top:10px; bottom:10px;
    width:3px; border-radius:2px; background:transparent;
    transition:background .15s ease;
  }
  .row.in-cart::before{ background:var(--orange); }

  .badge{
    width:68px; height:68px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Indie Flower'; font-weight:400; font-size:26px; color:#111;
    position:relative;
  }
  .badge-img{
    width:100%; height:100%; border-radius:10px;
    object-fit:cover; display:block; cursor:pointer;
  }
  .badge-fallback{
    width:100%; height:100%; align-items:center; justify-content:center;
  }

  .lightbox-overlay{ align-items:center; padding:24px; }
  .lightbox-box{
    position:relative; max-width:min(520px, 100%); width:100%;
    display:flex; flex-direction:column; align-items:center;
  }
  .lightbox-img{
    width:100%; max-height:70vh; object-fit:contain;
    border-radius:16px; background:var(--surface);
  }
  .lightbox-caption{
    font-family:'Indie Flower'; font-size:20px; color:var(--bg);
    margin-top:14px; text-transform:capitalize;
  }
  .lightbox-close{
    position:absolute; top:-14px; right:-6px;
    background:var(--ink); color:var(--bg); border-radius:50%;
    width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  }
  .row .badge{ width:100px; height:100px; font-size:30px; }

  .row-info{ flex:1; min-width:0; text-align:left; }
  .row-top{ display:flex; align-items:center; gap:8px; margin-bottom:1px; flex-wrap:wrap; }
  .kod{
    font-family:'JetBrains Mono'; font-size:10.5px; color:var(--ink-dim);
    letter-spacing:.05em;
  }
  .pname{
    font-family:'Indie Flower'; font-weight:400; font-size:18px;
    text-transform:capitalize; line-height:1.2;
  }
  .tag{
    font-size:10.5px; font-family:'JetBrains Mono'; color:var(--ink-dim);
    display:inline-flex; align-items:center; gap:5px; width:fit-content;
  }
  .swatch{ width:9px; height:9px; border-radius:50%; display:inline-block; }

  .row-qty{ margin-left:auto; flex-shrink:0; }
  .stepper{ display:flex; align-items:center; gap:0; background:var(--surface-2); border-radius:10px; overflow:hidden; }
  .stepper button{
    width:30px; height:30px; background:none; border:none; color:var(--ink);
    font-size:16px; cursor:pointer; font-family:'Inter'; font-weight:600;
  }
  .stepper button:hover{ background:rgba(0,0,0,.05); }
  .qty-input{
    width:44px; text-align:center; font-family:'JetBrains Mono'; font-size:13px;
    background:none; border:none; color:var(--ink); outline:none;
    -moz-appearance:textfield;
  }
  .qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button{
    -webkit-appearance:none; margin:0;
  }
  .add-circle{
    width:34px; height:34px; border-radius:50%;
    background:#46785e; color:var(--bg); border:none;
    font-family:'Inter'; font-weight:700; font-size:18px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .add-circle:hover{ filter:brightness(1.08); }

  .empty-msg{ padding:40px 20px; text-align:center; color:var(--ink-dim); font-size:14px; }
  .spinner{ text-align:center; padding:60px 0; color:var(--ink-dim); font-family:'JetBrains Mono'; font-size:12px; }

  /* ===== Floating tray ===== */
  .tray-bar{
    position:fixed; left:0; right:0; bottom:0;
    display:flex; justify-content:center; padding:14px 20px;
    pointer-events:none; z-index:20;
  }
  .tray-bar-inner{
    pointer-events:auto;
    max-width:680px; width:100%;
    background:#46785e; color:var(--bg);
    border-radius:16px; padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
    cursor:pointer; font-family:'Inter'; font-weight:700;
  }
  .tray-bar-inner .left{ display:flex; align-items:center; gap:10px; font-size:14px; }
  .tray-count{
    background:#17181c; color:#46785e; border-radius:50%;
    width:24px; height:24px; display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono'; font-size:12px;
  }
  .tray-bar-inner .arrow{ font-size:16px; }

  /* ===== Overlay / drawer ===== */
  .overlay{
    position:fixed; inset:0; background:rgba(10,10,12,.6);
    z-index:30; display:flex; align-items:flex-end; justify-content:center;
  }
  .overlay.top-align{ align-items:center; padding:20px; }
  .sheet{
    background:var(--bg); border-top:1px solid var(--line);
    border-radius:20px 20px 0 0; width:100%; max-width:720px;
    max-height:86vh; overflow-y:auto; padding:22px 20px 28px;
  }
  .overlay.top-align .sheet{ border-radius:20px; border:1px solid var(--line); max-height:90vh; }
  .sheet-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .sheet-title{ font-family:'Indie Flower'; font-weight:400; font-size:24px; }
  .close-x{ background:none; border:none; color:var(--ink-dim); font-size:20px; cursor:pointer; padding:4px; }

  .line-item{
    display:flex; align-items:center; gap:12px; padding:11px 0;
    border-bottom:1px solid var(--line);
  }
  .line-item .badge{ width:50px; height:50px; font-size:17px; }
  .li-info{ flex:1; min-width:0; }
  .li-name{ font-family:'Indie Flower'; font-weight:400; font-size:17px; text-transform:capitalize; }
  .li-kod{ font-family:'JetBrains Mono'; font-size:10px; color:var(--ink-dim); }
  .li-remove{ background:none; border:none; color:var(--ink-dim); font-size:18px; cursor:pointer; padding:6px; }
  .li-remove:hover{ color:var(--orange); }

  .cta-btn{
    width:100%; background:var(--orange); color:#17181c; border:none;
    border-radius:12px; padding:15px; font-family:'Inter'; font-weight:700;
    font-size:15px; cursor:pointer; margin-top:18px;
  }
  .cta-btn:hover{ filter:brightness(1.08); }
  .cta-btn:disabled{ opacity:.4; cursor:not-allowed; }
  .cta-btn.ghost{ background:none; border:1px solid var(--line); color:var(--ink); margin-top:10px; }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; color:var(--ink-dim); margin-bottom:6px; font-family:'JetBrains Mono'; letter-spacing:.03em;}
  .field input, .field textarea{
    width:100%; background:var(--surface); border:1px solid var(--line);
    border-radius:10px; padding:12px 14px; color:var(--ink); font-family:'Inter'; font-size:14.5px;
    outline:none;
  }
  .field input:focus, .field textarea:focus{ border-color:var(--teal); }
  .field textarea{ resize:vertical; min-height:70px; }
  .hint{ font-size:12px; color:var(--ink-dim); margin-top:-8px; margin-bottom:14px; }

  .confirm-wrap{ text-align:center; padding:30px 10px 10px; }
  .confirm-icon{ font-size:42px; margin-bottom:14px; }
  .confirm-title{ font-family:'Indie Flower'; font-weight:400; font-size:26px; margin-bottom:8px; }
  .confirm-text{ color:var(--ink-dim); font-size:14px; line-height:1.6; }

  .err{ color:var(--orange); font-size:12.5px; margin-top:8px; }


  /* ===== Welcome (karşılama) ===== */
  .welcome-wrap{
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:40px 28px; gap:0; position:relative;
  }
  .welcome-logo{
    height:150px; width:auto; margin-bottom:28px;
  }
  .welcome-greet{
    font-family:'Inter'; font-size:15px; color:var(--ink-dim);
    max-width:34ch; line-height:1.6; margin-bottom:34px;
  }
  .welcome-hello{
    font-family:'Indie Flower', cursive; font-size:44px; color:var(--ink);
    margin-bottom:30px;
  }
  .welcome-cta{
    background:#46785e; color:var(--bg);
    border:none;
    border-radius:12px; padding:16px 34px; font-family:'Indie Flower', cursive; font-weight:400;
    font-size:20px; cursor:pointer; letter-spacing:.01em;
  }
  .welcome-cta:hover{ filter:brightness(1.08); }
  .ig-link{
    position:absolute; top:22px; right:20px;
    width:42px; height:42px; border-radius:50%;
    background:var(--surface); border:1px solid var(--line);
    color:#46785e; display:flex;
    align-items:center; justify-content:center;

const PALETTE = ["#ff5a36","#2dd4bf","#ffc93c","#a78bfa","#fb7ba2","#4ea1ff"];
const IMAGE_BASE = "https://raw.githubusercontent.com/Oss-y/pdaprint3d-keychain/main/";

function startCatalogListener(){
  const q = query(collection(db, "products"), orderBy("kod"));
  onSnapshot(q, snap=>{
    CATALOG = snap.docs.map(d=>({ kod: d.id, isim: d.data().isim, stok: d.data().stok ?? 0, renk: null }));
    if (state.view === "catalog" || state.view === "tray") render();
  });
}
function colorFor(kod){
  let h = 0;
  for (let i=0;i<kod.length;i++) h = (h*31 + kod.charCodeAt(i)) % PALETTE.length;
  return PALETTE[h];
}
const COLOR_NAMES = { pembe:"#fb7ba2", mavi:"#4ea1ff" };

/* ================= STATE ================= */
let state = {
  view: "welcome", // welcome | catalog | tray | contact | confirm
  user: null,
  authChecked: false,
  loginError: "",
  cart: {}, // kod -> qty
  search: "",
  searchOpen: false,
  contact: { shopName:"", note:"" },
  lastError: null,
};

const root = document.getElementById("app");

/* ================= HELPERS ================= */
function currentUsername(){
  if (!state.user || !state.user.email) return "";
  return state.user.email.replace(EMAIL_DOMAIN, "");
}
function cartCount(){
  return Object.values(state.cart).reduce((a,b)=>a+b,0);
}
function cartItems(){
  return Object.entries(state.cart)
    .filter(([,q])=>q>0)
    .map(([kod,q])=>({ ...CATALOG.find(p=>p.kod===kod), qty:q }));
}
function badgeHtml(p, size){
  const c = colorFor(p.kod);
  const initial = p.isim.trim().charAt(0).toUpperCase();
  const imgUrl = IMAGE_BASE + p.kod + ".png";
  return `<div class="badge" style="background:${c};color:${c};">
            <img class="badge-img" src="${imgUrl}" alt="${p.isim}" loading="lazy"
                 onclick="event.stopPropagation(); openLightbox('${imgUrl}', '${p.isim.replace(/'/g,"\\'")}')"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <span class="badge-fallback" style="color:#17181c; display:none;">${initial}</span>
          </div>`;
}
function renkTag(p){
  if (!p.renk) return "";
  if (p.renk === "sunlu"){
    return `<span class="tag">☀️ Güneşte renk değiştirir</span>`;
  }
  const parts = p.renk.split("-");
  const dots = parts.map(c=>`<span class="swatch" style="background:${COLOR_NAMES[c]||'#888'}"></span>`).join("");
  return `<span class="tag">${dots} ${parts.join(" - ")}</span>`;
}

/* ================= LIGHTBOX ================= */
function openLightbox(url, alt){
  const overlay = document.createElement("div");
  overlay.className = "overlay lightbox-overlay";
  overlay.innerHTML = `
    <div class="lightbox-box">
      <button class="close-x lightbox-close" id="lightbox-close">✕</button>
      <img class="lightbox-img" src="${url}" alt="${alt}">
      <div class="lightbox-caption">${alt}</div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e=>{ if(e.target===overlay) overlay.remove(); });
  overlay.querySelector("#lightbox-close").addEventListener("click", ()=>overlay.remove());
}

/* ================= RENDER: WELCOME (karşılama) ================= */
function renderWelcome(){
  root.innerHTML = `
    <div class="welcome-wrap">
      <img class="welcome-logo" src="${LOGO_SRC}" alt="PDAprint 3d logo">
      <div class="field" style="width:100%; max-width:280px;">
        <input id="wl-user" placeholder="Kullanıcı adı" autocapitalize="off" autocorrect="off"
          style="width:100%; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:13px 16px; color:var(--ink); font-size:14.5px; outline:none; margin-bottom:10px;">
        <input id="wl-pass" type="password" placeholder="Şifre"
          style="width:100%; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:13px 16px; color:var(--ink); font-size:14.5px; outline:none;">
      </div>
      <div class="err" id="wl-err" style="min-height:16px; margin:8px 0 4px;">${state.loginError}</div>
      <button class="welcome-cta" id="welcome-start" style="margin-top:14px;">Giriş Yap</button>
    </div>
    <a class="ig-link" href="https://www.instagram.com/pdaprint3d?igsh=Nnk3djNja2N6dDdv" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2.5" y="2.5" width="19" height="19" rx="5.5" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="4.6" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="17.4" cy="6.6" r="1.2" fill="currentColor"/>
      </svg>
    </a>
  `;
  const doLogin = async ()=>{
    const u = document.getElementById("wl-user").value.trim().toLowerCase();
    const p = document.getElementById("wl-pass").value;
    const errEl = document.getElementById("wl-err");
    if (!u || !p){ errEl.textContent = "Kullanıcı adı ve şifre gerekli."; return; }
    const btn = document.getElementById("welcome-start");
    btn.disabled = true; btn.textContent = "Giriş yapılıyor...";
    try{
      await signInWithEmailAndPassword(auth, u + EMAIL_DOMAIN, p);
      state.loginError = "";
    }catch(e){
      state.loginError = "Kullanıcı adı veya şifre hatalı.";
      btn.disabled = false; btn.textContent = "Giriş Yap";
      render();
    }
  };
  document.getElementById("welcome-start").addEventListener("click", doLogin);
  document.getElementById("wl-pass").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
}

/* ================= RENDER: CATALOG ================= */
function renderCatalog(){
  const q = state.search.trim().toLowerCase();
  const items = CATALOG.filter(p => p.isim.toLowerCase().includes(q) || p.kod.toLowerCase().includes(q));

  const cards = items.map(p=>{
    const qty = state.cart[p.kod] || 0;
    return `
      <div class="row ${qty>0?'in-cart':''}" data-kod="${p.kod}">
        ${badgeHtml(p)}
        <div class="row-info">
          <span class="kod">${p.kod}</span>
          <div class="pname">${p.isim}</div>
          <span class="tag stock-tag" style="color:${(p.stok||0)===0 ? 'var(--orange)' : (p.stok||0)<=3 ? '#c98a1f' : 'var(--ink-dim)'};">Stok: ${p.stok||0}</span>
        </div>
        <div class="row-qty">
          ${qty>0 ? `
            <div class="stepper">
              <button class="dec" data-kod="${p.kod}">–</button>
              <input class="qty-input" type="number" inputmode="numeric" min="0" data-kod="${p.kod}" value="${qty}">
              <button class="inc" data-kod="${p.kod}">+</button>
            </div>
          ` : `<button class="add-circle inc" data-kod="${p.kod}">+</button>`}
        </div>
      </div>`;
  }).join("");

  root.innerHTML = `
    <header class="top-slim">
      <button class="search-toggle" id="search-toggle" aria-label="Ara">
        <svg width="20" height="20" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9.3 2.6 C5.4 2.2, 2.4 5.1, 2.6 9 C2.8 12.7, 5.9 15.3, 9.6 14.9 C13.1 14.5, 15.6 11.4, 15.1 8 C14.7 5, 12.3 2.9, 9.3 2.6 Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.6 13.3 C14.9 14.7, 16.4 16.4, 17.4 17.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>
      <div style="display:flex; align-items:center; gap:10px;">
        <button id="logout-btn" style="font-family:'JetBrains Mono'; font-size:10.5px; color:var(--ink-dim); background:none; border:1px solid var(--line); border-radius:14px; padding:5px 10px; cursor:pointer;">${currentUsername()} · Çıkış</button>
        <img class="mini-logo" src="${LOGO_SRC}" alt="PDAprint 3d">
      </div>
    </header>
    ${state.searchOpen ? `
    <div class="search-wrap">
      <input class="search" id="search" placeholder="Anahtarlık ara (ör. pikachu, gs forma...)" value="${state.search}">
    </div>` : ""}
    <div class="catalog-list">
      ${items.length ? cards : `<div class="empty-msg">Aramanla eşleşen ürün yok.</div>`}
    </div>
    ${cartCount() > 0 ? `
      <div class="tray-bar">
        <div class="tray-bar-inner" id="open-tray">
          <div class="left"><span class="tray-count">${cartCount()}</span> ürün seçildi</div>
          <span class="arrow">İstek listesine geç →</span>
        </div>
      </div>` : ""}
  `;

  document.getElementById("search-toggle").addEventListener("click", ()=>{
    state.searchOpen = !state.searchOpen;
    if (!state.searchOpen) state.search = "";
    renderCatalog();
    if (state.searchOpen){
      const el = document.getElementById("search");
      if (el) el.focus();
    }
  });
  document.getElementById("logout-btn").addEventListener("click", ()=>{ signOut(auth); });
  const searchEl = document.getElementById("search");
  if (searchEl){
    searchEl.addEventListener("input", e=>{
      state.search = e.target.value; renderCatalog();
      const el = document.getElementById("search");
      el.focus();
      el.setSelectionRange(state.search.length, state.search.length);
    });
  }
  const trayBtn = document.getElementById("open-tray");
  if (trayBtn) trayBtn.addEventListener("click", ()=>{ state.view="tray"; render(); });

  root.querySelectorAll(".inc").forEach(btn=>btn.addEventListener("click",()=>{
    const kod = btn.dataset.kod;
    state.cart[kod] = (state.cart[kod]||0)+1;
    renderCatalog();
  }));
  root.querySelectorAll(".dec").forEach(btn=>btn.addEventListener("click",()=>{
    const kod = btn.dataset.kod;
    state.cart[kod] = Math.max(0,(state.cart[kod]||0)-1);
    renderCatalog();
  }));
  root.querySelectorAll(".qty-input").forEach(inp=>{
    inp.addEventListener("click", e=>e.target.select());
    inp.addEventListener("change", ()=>{
      const kod = inp.dataset.kod;
      let val = parseInt(inp.value, 10);
      if (isNaN(val) || val < 0) val = 0;
      state.cart[kod] = val;
      renderCatalog();
    });
  });
}

/* ================= RENDER: TRAY (istek listesi) ================= */
function renderTray(){
  renderCatalog(); // keep catalog underneath
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  const items = cartItems();
  overlay.innerHTML = `
    <div class="sheet">
      <div class="sheet-head">
        <div class="sheet-title">İstek Listen</div>
        <button class="close-x" id="close-tray">✕</button>
      </div>
      ${items.map(p=>`
        <div class="line-item">
          ${badgeHtml(p)}
          <div class="li-info">
            <div class="li-name">${p.isim}</div>
            <div class="li-kod">${p.kod} · ${p.qty} adet</div>
          </div>
          <button class="li-remove" data-kod="${p.kod}">✕</button>
        </div>
      `).join("")}
      <button class="cta-btn" id="go-contact" ${items.length? "" : "disabled"}>İletişim bilgilerini bırak</button>
      <button class="cta-btn ghost" id="continue-shopping">Kataloğa devam et</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e=>{ if(e.target===overlay){ overlay.remove(); state.view="catalog"; } });
  overlay.querySelector("#close-tray").addEventListener("click", ()=>{ overlay.remove(); state.view="catalog"; });
  overlay.querySelector("#continue-shopping").addEventListener("click", ()=>{ overlay.remove(); state.view="catalog"; });
  overlay.querySelector("#go-contact").addEventListener("click", ()=>{ overlay.remove(); state.view="contact"; render(); });
  overlay.querySelectorAll(".li-remove").forEach(btn=>btn.addEventListener("click",()=>{
    delete state.cart[btn.dataset.kod];
    overlay.remove();
    if (cartCount()>0){ state.view="tray"; render(); } else { state.view="catalog"; render(); }
  }));
}

/* ================= RENDER: CONTACT FORM ================= */
function renderContact(){
  renderCatalog();
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.innerHTML = `
    <div class="sheet">
      <div class="sheet-head">
        <div class="sheet-title">Teslimat Bilgisi</div>
        <button class="close-x" id="close-contact">✕</button>
      </div>
      <div class="field">
        <label>Dükkan Adı</label>
        <input id="f-shop" placeholder="Ürünlerin teslim edileceği dükkan" value="${state.contact.shopName||''}">
      </div>
      <div class="field">
        <label>Not (opsiyonel)</label>
        <textarea id="f-note" placeholder="Renk tercihi, teslimat notu vb.">${state.contact.note}</textarea>
      </div>
      <div id="form-err" class="err"></div>
      <button class="cta-btn" id="submit-request">Talebi Gönder</button>
      <button class="cta-btn ghost" id="back-to-tray">Geri dön</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e=>{ if(e.target===overlay) overlay.remove(); });
  overlay.querySelector("#close-contact").addEventListener("click", ()=>overlay.remove());
  overlay.querySelector("#back-to-tray").addEventListener("click", ()=>{ overlay.remove(); state.view="tray"; render(); });

  overlay.querySelector("#submit-request").addEventListener("click", async ()=>{
    const shopName = overlay.querySelector("#f-shop").value.trim();
    const note = overlay.querySelector("#f-note").value.trim();
    const errEl = overlay.querySelector("#form-err");
    if (!shopName){ errEl.textContent = "Lütfen dükkan adını gir."; return; }

    const btn = overlay.querySelector("#submit-request");
    btn.disabled = true; btn.textContent = "Gönderiliyor...";

    const order = {
      employee: currentUsername(),
      shopName,
      note,
      items: cartItems().map(p=>({kod:p.kod, isim:p.isim, qty:p.qty})),
      status: "Yeni",
      createdAt: serverTimestamp(),
    };

    try{
      await addDoc(collection(db, "orders"), order);
      await decrementStock(order.items);
      state.cart = {};
      state.contact = { shopName:"", note:"" };
      overlay.remove();
      state.view = "confirm";
      render();
    }catch(err){
      errEl.textContent = "Kaydedilirken bir sorun oluştu, tekrar dene.";
      btn.disabled = false; btn.textContent = "Talebi Gönder";
    }
  });
}

async function decrementStock(items){
  for (const it of items){
    try{
      await runTransaction(db, async (tx)=>{
        const ref = doc(db, "products", it.kod);
        const snap = await tx.get(ref);
        if (!snap.exists()) return;
        const current = snap.data().stok || 0;
        tx.update(ref, { stok: Math.max(0, current - it.qty) });
      });
    }catch(e){ /* best effort, sipariş yine de kaydedildi */ }
  }
}

/* ================= RENDER: CONFIRM ================= */
function renderConfirm(){
  root.innerHTML = `
    <div class="confirm-wrap">
      <div class="confirm-icon">✅</div>
      <div class="confirm-title">Sipariş kaydedildi!</div>
      <div class="confirm-text">Sipariş anında Takip Paneli'ne düştü.<br>Yeni bir sipariş girmek için kataloğa dönebilirsin.</div>
      <button class="cta-btn" id="back-catalog" style="margin-top:24px;">Kataloğa dön</button>
    </div>
  `;
  document.getElementById("back-catalog").addEventListener("click", ()=>{ state.view="catalog"; render(); });
}


/* ================= MAIN RENDER ================= */
function render(){
  if (!state.authChecked){ root.innerHTML = `<div class="spinner">Yükleniyor...</div>`; return; }
  if (state.view === "welcome") renderWelcome();
  else if (state.view === "catalog") renderCatalog();
  else if (state.view === "tray") renderTray();
  else if (state.view === "contact") renderContact();
  else if (state.view === "confirm") renderConfirm();
}

onAuthStateChanged(auth, (user)=>{
  const wasLoggedOut = !state.user;
  state.user = user;
  state.authChecked = true;
  if (user){
    startCatalogListener();
    if (wasLoggedOut && state.view === "welcome") state.view = "catalog";
  } else {
    state.view = "welcome";
    state.cart = {};
  }
  render();
});

window.openLightbox = openLightbox;

</script>
</body>
</html>
